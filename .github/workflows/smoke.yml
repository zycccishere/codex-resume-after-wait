name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Help
        run: python3 skills/blocking-wait-handoff/scripts/codex_wait_handoff.py --help
      - name: Status help
        run: python3 skills/blocking-wait-handoff/scripts/codex_wait_handoff.py status --help
